<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400">
  <rect width="900" height="400" fill="#0d1117"/>
  
  <text x="450" y="30" fill="#58a6ff" font-size="20" text-anchor="middle" font-weight="bold">ML Data Pipeline Architecture</text>
  
  <!-- Stage 1: Collection -->
  <rect x="30" y="60" width="140" height="60" rx="8" fill="#238636"/>
  <text x="100" y="85" fill="#fff" font-size="12" text-anchor="middle">1. COLLECTION</text>
  <text x="100" y="105" fill="#8b949e" font-size="9" text-anchor="center">Raw Data Sources</text>
  
  <!-- Stage 2: Preprocessing -->
  <rect x="200" y="60" width="140" height="60" rx="8" fill="#1f6feb"/>
  <text x="270" y="85" fill="#fff" font-size="12" text-anchor="middle">2. PREPROCESS</text>
  <text x="270" y="105" fill="#8b949e" font-size="9" text-anchor="center">Clean + Transform</text>
  
  <!-- Stage 3: Feature Engineering -->
  <rect x="370" y="60" width="140" height="60" rx="8" fill="#8957e5"/>
  <text x="440" y="85" fill="#fff" font-size="12" text-anchor="middle">3. FEATURES</text>
  <text x="440" y="105" fill="#8b949e" font-size="9" text-anchor="center">Extract + Encode</text>
  
  <!-- Stage 4: Model Training -->
  <rect x="540" y="60" width="140" height="60" rx="8" fill="#f78166"/>
  <text x="610" y="85" fill="#fff" font-size="12" text-anchor="middle">4. TRAINING</text>
  <text x="610" y="105" fill="#8b949e" font-size="9" text-anchor="center">Train + Validate</text>
  
  <!-- Stage 5: Inference -->
  <rect x="710" y="60" width="140" height="60" rx="8" fill="#3fb950"/>
  <text x="780" y="85" fill="#fff" font-size="12" text-anchor="middle">5. INFERENCE</text>
  <text x="780" y="105" fill="#8b949e" font-size="9" text-anchor="center">Predict + Deploy</text>
  
  <!-- Arrows between stages -->
  <line x1="170" y1="90" x2="200" y2="90" stroke="#58a6ff" stroke-width="3"/>
  <line x1="340" y1="90" x2="370" y2="90" stroke="#58a6ff" stroke-width="3"/>
  <line x1="510" y1="90" x2="540" y2="90" stroke="#58a6ff" stroke-width="3"/>
  <line x1="680" y1="90" x2="710" y2="90" stroke="#58a6ff" stroke-width="3"/>
  
  <!-- Stage 1 Details -->
  <rect x="30" y="140" width="140" height="80" rx="5" fill="#21262d" stroke="#30363d"/>
  <text x="100" y="160" fill="#8b949e" font-size="10" text-anchor="middle">Sources:</text>
  <text x="100" y="175" fill="#c9d1d9" font-size="9" text-anchor="middle">Blood/CSF Tests</text>
  <text x="100" y="188" fill="#c9d1d9" font-size="9" text-anchor="middle">DNA Sequencing</text>
  <text x="100" y="201" fill="#c9d1d9" font-size="9" text-anchor="middle">Wearables (sleep/HR)</text>
  <text x="100" y="214" fill="#c9d1d9" font-size="9" text-anchor="middle">MRI Scans</text>
  
  <!-- Stage 2 Details -->
  <rect x="200" y="140" width="140" height="80" rx="5" fill="#21262d" stroke="#30363d"/>
  <text x="270" y="160" fill="#8b949e" font-size="10" text-anchor="middle">Processing:</text>
  <text x="270" y="175" fill="#c9d1d9" font-size="9" text-anchor="middle">QC (FastQC)</text>
  <text x="270" y="188" fill="#c9d1d9" font-size="9" text-anchor="middle">Alignment</text>
  <text x="270" y="201" fill="#c9d1d9" font-size="9" text-anchor="middle">Normalization</text>
  <text x="270" y="214" fill="#c9d1d9" font-size="9" text-anchor="middle">Imputation</text>
  
  <!-- Stage 3 Details -->
  <rect x="370" y="140" width="140" height="80" rx="5" fill="#21262d" stroke="#30363d"/>
  <text x="440" y="160" fill="#8b949e" font-size="10" text-anchor="middle">Features:</text>
  <text x="440" y="175" fill="#c9d1d9" font-size="9" text-anchor="middle">Gene Expression</text>
  <text x="440" y="188" fill="#c9d1d9" font-size="9" text-anchor="middle">TF Activities</text>
  <text x="440" y="201" fill="#c9d1d9" font-size="9" text-anchor="middle">Epigenetic Marks</text>
  <text x="440" y="214" fill="#c9d1d9" font-size="9" text-anchor="middle">Module Scores</text>
  
  <!-- Stage 4 Details -->
  <rect x="540" y="140" width="140" height="80" rx="5" fill="#21262d" stroke="#30363d"/>
  <text x="610" y="160" fill="#8b949e" font-size="10" text-anchor="middle">Models:</text>
  <text x="610" y="175" fill="#c9d1d9" font-size="9" text-anchor="middle">GNN (PyG)</text>
  <text x="610" y="188" fill="#c9d1d9" font-size="9" text-anchor="middle">Transformers</text>
  <text x="610" y="201" fill="#c9d1d9" font-size="9" text-anchor="middle">Neural ODE</text>
  <text x="610" y="214" fill="#c9d1d9" font-size="9" text-anchor="middle">RL Agents</text>
  
  <!-- Stage 5 Details -->
  <rect x="710" y="140" width="140" height="80" rx="5" fill="#21262d" stroke="#30363d"/>
  <text x="780" y="160" fill="#8b949e" font-size="10" text-anchor="middle">Outputs:</text>
  <text x="780" y="175" fill="#c9d1d9" font-size="9" text-anchor="middle">MHI Score</text>
  <text x="780" y="188" fill="#c9d1d9" font-size="9" text-anchor="middle">Risk Prediction</text>
  <text x="780" y="201" fill="#c9d1d9" font-size="9" text-anchor="middle">Intervention Recs</text>
  <text x="780" y="214" fill="#c9d1d9" font-size="9" text-anchor="middle">Uncertainty Quant</text>
  
  <!-- Storage Layer -->
  <rect x="100" y="310" width="700" height="70" rx="8" fill="#161b22" stroke="#30363d"/>
  <text x="450" y="335" fill="#8b949e" font-size="12" text-anchor="middle">DATA STORAGE & MODEL REGISTRY</text>
  
  <rect x="120" y="345" width="100" height="25" rx="4" fill="#238636"/>
  <text x="170" y="362" fill="#fff" font-size="9" text-anchor="middle">Raw Data Lake</text>
  
  <rect x="240" y="345" width="100" height="25" rx="4" fill="#1f6feb"/>
  <text x="290" y="362" fill="#fff" font-size="9" text-anchor="middle">Processed</text>
  
  <rect x="360" y="345" width="100" height="25" rx="4" fill="#8957e5"/>
  <text x="410" y="362" fill="#fff" font-size="9" text-anchor="middle">Features DB</text>
  
  <rect x="480" y="345" width="100" height="25" rx="4" fill="#f78166"/>
  <text x="530" y="362" fill="#fff" font-size="9" text-anchor="middle">Model Registry</text>
  
  <rect x="600" y="345" width="100" height="25" rx="4" fill="#3fb950"/>
  <text x="650" y="362" fill="#fff" font-size="9" text-anchor="middle">Predictions</text>
  
  <line x1="100" y1="220" x2="100" y2="310" stroke="#30363d" stroke-width="2" stroke-dasharray="5,5"/>
  <line x1="270" y1="220" x2="270" y2="310" stroke="#30363d" stroke-width="2" stroke-dasharray="5,5"/>
  <line x1="440" y1="220" x2="440" y2="310" stroke="#30363d" stroke-width="2" stroke-dasharray="5,5"/>
  <line x1="610" y1="220" x2="610" y2="310" stroke="#30363d" stroke-width="2" stroke-dasharray="5,5"/>
  <line x1="780" y1="220" x2="780" y2="310" stroke="#30363d" stroke-width="2" stroke-dasharray="5,5"/>
</svg>